services:
  # PostgreSQL Database
  - type: pserv
    name: kisisel-website-postgres
    plan: starter
    region: frankfurt
    databaseName: tourism_db
    databaseUser: tourism_user
    ipAllowList: []

  # Backend API Service
  - type: web
    name: kisisel-website-backend
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index-postgres.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kisisel-website-postgres
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: kisisel-website-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
